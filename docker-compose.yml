version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: looplink-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-looplink}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - looplink-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
    container_name: looplink-backend
    ports:
      - "${PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-looplink}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-looplink}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-24h}
      GIN_MODE: ${GIN_MODE:-debug}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:5174}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - looplink-network
    volumes:
      - ./services/backend:/app
    command: go run ./cmd/api/main.go

  # Admin Web Frontend (optional - for development)
  admin-web:
    build:
      context: ./apps/admin-web
      dockerfile: Dockerfile.dev
    container_name: looplink-admin-web
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    networks:
      - looplink-network
    volumes:
      - ./apps/admin-web:/app
      - /app/node_modules
    command: npm run dev

  # Driver Web Frontend (optional - for development)
  driver-web:
    build:
      context: ./apps/driver-web
      dockerfile: Dockerfile.dev
    container_name: looplink-driver-web
    ports:
      - "5174:5174"
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    networks:
      - looplink-network
    volumes:
      - ./apps/driver-web:/app
      - /app/node_modules
    command: npm run dev -- --port 5174

volumes:
  postgres_data:
    driver: local

networks:
  looplink-network:
    driver: bridge
